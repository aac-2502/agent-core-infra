name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 1. Lint — corre en PRs y en push ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check lib/

  # ── 2. SECURITY GATE — bloquea todo lo que sigue si falla ─────────────────
  security-scan:
    name: Security gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detecta secrets en todo el historial del repo
      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # CVEs en dependencias declaradas
      - name: pip-audit — Python CVEs
        run: |
          pip install pip-audit --quiet
          pip install -e ".[dev]" --quiet
          pip-audit --strict

      # SAST: solo high severity para no bloquear en falsos positivos
      - name: Bandit — Python SAST
        run: |
          pip install bandit --quiet
          bandit -r lib/ -lll -q

      # SAST + secrets con Semgrep OSS (gratis, sin token)
      - name: Semgrep — SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/secrets
            p/python

  # ── 3. Tests — SOLO en push, nunca en pull_request de forks ───────────────
  # Fix finding #14: los secrets de producción no se exponen en PRs externas.
  test:
    name: Tests
    needs: [lint, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:          ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:          ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:              agent-artifacts-test
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM_DOMAIN:      ${{ secrets.EMAIL_FROM_DOMAIN }}
          LEMON_SQUEEZY_API_KEY:  ${{ secrets.LEMON_SQUEEZY_API_KEY }}
          LEMON_STORE_ID:         ${{ secrets.LEMON_STORE_ID }}
          LEMON_WEBHOOK_SECRET:   ${{ secrets.LEMON_WEBHOOK_SECRET }}
          PAYMENT_PROVIDER:       lemon_squeezy
